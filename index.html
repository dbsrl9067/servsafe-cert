<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ServSafe® Search Certificates</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', Arial, sans-serif;
      background: #f0f0f0;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
    }
    /* ServSafe SVG logo approximation */
    .logo-svg-wrap svg { width: 130px; height: auto; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .cart-icon {
      position: relative;
      cursor: pointer;
    }
    .cart-icon svg { width: 32px; height: 32px; color: #0066cc; }
    .cart-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: #2ecc40;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .menu-icon {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .menu-icon span {
      display: block;
      width: 26px; height: 3px;
      background: #0066cc;
      border-radius: 2px;
    }

    /* ── CERT IMAGE AREA ── */
    .cert-thumb {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }
    .cert-thumb-box {
      width: 64px; height: 56px;
      border: 1px solid #bbb;
      background: #f9f9f9;
      display: flex; align-items: center; justify-content: center;
    }
    .cert-thumb-box svg { width: 40px; height: 40px; }

    /* ── TABLE ── */
    .table-wrap {
      background: #fff;
      flex: 1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      border-bottom: 2px solid #ccc;
    }
    thead th {
      text-align: left;
      padding: 12px 16px 8px;
      font-size: 14px;
      font-weight: 700;
      color: #222;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #e8e8e8;
    }
    tbody td {
      padding: 12px 16px;
      font-size: 15px;
      color: #222;
      vertical-align: top;
    }
    tbody tr:last-child { border-bottom: none; }

    /* highlight exam date bold */
    .bold { font-weight: 700; }

    /* ── FOOTER ── */
    footer {
      background: #1a1a1a;
      color: #bbb;
      padding: 30px 20px 20px;
      margin-top: auto;
    }
    .footer-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 14px;
    }
    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-links a {
      color: #bbb;
      font-size: 14px;
      text-decoration: none;
    }
    .footer-links a:hover { color: #fff; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <!-- ServSafe logo recreation -->
    <a href="https://www.servsafe.com/?_gl=1*1t3uxev*_up*MQ..*_ga*MTU5MTc4Mzk5OS4xNzczMzc5ODg4*_ga_Y1PBFK1B56*czE3NzMzNzk4ODgkbzEkZzAkdDE3NzMzNzk4ODgkajYwJGwwJGgxNTY1NzU3MzE3" target="_blank"><svg width="140" height="44" viewBox="0 0 140 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Blue swoosh arc -->
      <path d="M8 22 Q30 4 60 10 Q80 14 90 22" stroke="#0066cc" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- S mark -->
      <text x="6" y="32" font-family="Arial" font-weight="900" font-size="22" fill="#0066cc">S</text>
      <!-- ServSafe text -->
      <text x="24" y="30" font-family="Arial" font-weight="700" font-size="17" fill="#0066cc">ervSafe</text>
      <!-- Registered -->
      <text x="104" y="20" font-family="Arial" font-size="9" fill="#0066cc">®</text>
      <!-- Subtext -->
      <text x="24" y="40" font-family="Arial" font-size="8" fill="#555">National Restaurant Association</text>
    </svg></a>
  </div>

  <div class="header-right">
    <!-- Cart -->
    <div class="cart-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0066cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <div class="cart-badge">0</div>
    </div>
    <!-- Hamburger -->
    <div class="menu-icon">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<!-- CERT THUMBNAIL -->
<div class="cert-thumb">
  <div class="cert-thumb-box">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="4" width="32" height="26" rx="1" fill="#f5f5f5" stroke="#aaa" stroke-width="1.5"/>
      <rect x="5" y="8" width="16" height="2" rx="1" fill="#bbb"/>
      <rect x="5" y="12" width="22" height="1.5" rx="1" fill="#ccc"/>
      <rect x="5" y="15.5" width="18" height="1.5" rx="1" fill="#ccc"/>
      <circle cx="30" cy="28" r="7" fill="#f5e642" stroke="#ccc" stroke-width="1"/>
      <path d="M27 28l2 2 4-4" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Last<br/>Name</th>
        <th>First<br/>Name</th>
        <th>Cert#</th>
        <th>Exam<br/>Date</th>
        <th>Expires</th>
      </tr>
    </thead>
    <tbody id="certBody">
      <!-- Populated by JS -->
    </tbody>
  </table>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-section-title">ABOUT</div>
  <div class="footer-links">
    <a href="https://www.servsafe.com/About-Us?_gl=1*cwdvz3*_up*MQ..*_ga*MTgwMzE2MjIyLjE3NzMzNzk5MDk.*_ga_Y1PBFK1B56*czE3NzMzNzk5MDgkbzEkZzAkdDE3NzMzNzk5MDgkajYwJGwwJGgxNTc1MTkxMTMw" target="_blank">About Us</a>
    <a href="https://www.servsafe.com/Contact-Us?_gl=1*12p7s4t*_up*MQ..*_ga*ODc0Mzc3NDQwLjE3NzMzNzk5Mjk.*_ga_Y1PBFK1B56*czE3NzMzNzk5MjkkbzEkZzAkdDE3NzMzNzk5MjkkajYwJGwwJGgxNDgyMDQxMTQy" target="_blank">Contact Customer Care</a>
  </div>
</footer>

<script>
const certs = [
  { last: "MIN", first: "JONG\nHO", cert: "2479541", examDate: "2/21/2025", expires: "2/21/2030" }
];

function render() {
  const tbody = document.getElementById('certBody');
  tbody.innerHTML = certs.map(c => `
    <tr>
      <td>${c.last}</td>
      <td style="white-space:pre-line">${c.first}</td>
      <td>${c.cert}</td>
      <td class="bold">${c.examDate}</td>
      <td class="bold">${c.expires}</td>
    </tr>
  `).join('');
}

render();
</script>
</body>
</html>
