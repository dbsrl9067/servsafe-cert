<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ServSafe® Search Certificates</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', Arial, sans-serif;
      background: #f0f0f0;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
    }
    /* ServSafe SVG logo approximation */
    .logo-svg-wrap svg { width: 130px; height: auto; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .cart-icon {
      position: relative;
      cursor: pointer;
    }
    .cart-icon svg { width: 32px; height: 32px; color: #0066cc; }
    .cart-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: #2ecc40;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .menu-icon {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .menu-icon span {
      display: block;
      width: 26px; height: 3px;
      background: #0066cc;
      border-radius: 2px;
    }

    /* ── CERT IMAGE AREA ── */
    .cert-thumb {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }
    .cert-thumb-box {
      width: 64px; height: 56px;
      border: 1px solid #bbb;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .cert-thumb-box svg { width: 40px; height: 40px; }

    /* ── TABLE ── */
    .table-wrap {
      background: #fff;
      flex: 1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      border-bottom: 2px solid #ccc;
    }
    thead th {
      text-align: left;
      padding: 12px 16px 8px;
      font-size: 14px;
      font-weight: 700;
      color: #222;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #e8e8e8;
    }
    tbody td {
      padding: 12px 16px;
      font-size: 15px;
      color: #222;
      vertical-align: top;
    }
    tbody tr:last-child { border-bottom: none; }

    /* highlight exam date bold */
    .bold { font-weight: 700; }

    /* ── FOOTER ── */
    footer {
      background: #1a1a1a;
      color: #bbb;
      padding: 30px 20px 20px;
      margin-top: auto;
    }
    .footer-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 14px;
    }
    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-links a {
      color: #bbb;
      font-size: 14px;
      text-decoration: none;
    }
    .footer-links a:hover { color: #fff; }
  </style>
</head>
